services:
  - type: web
    name: ai-persona-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CALCOM_API_KEY
        sync: false
      - key: CALCOM_EVENT_TYPE_ID
        sync: false
      - key: OWNER_NAME
        sync: false
      - key: ROLE
        sync: false
      - key: RESUME_TEXT_PATH
        value: ./data/resume.txt
      - key: GITHUB_REPOS_PATH
        value: ./data/repos/
